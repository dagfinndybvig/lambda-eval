name: CI

on:
  push:
  pull_request:

jobs:
  prolog-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SWI-Prolog
        run: |
          sudo apt-get update
          sudo apt-get install -y swi-prolog-nox

      - name: Run factorial benchmarks
        run: |
          output1="$(swipl -q -s lambda_eval.pl -g \"run_file('examples/fact5.lisp'),halt.\")"
          echo "fact5 output: $output1"
          test "$output1" = "120"

          output2="$(swipl -q -s lambda_eval.pl -g \"run_file('examples/fact5_define.lisp'),halt.\")"
          echo "fact5_define output: $output2"
          test "$output2" = "120"
